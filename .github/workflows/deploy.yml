name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Push du build sur la branche gh-pages (source Pages : branche gh-pages / root).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare .env from GitHub Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BGG_APPLICATION_TOKEN: ${{ secrets.BGG_APPLICATION_TOKEN }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
          REBRICKABLE_API_KEY: ${{ secrets.REBRICKABLE_API_KEY }}
        run: bash scripts/write_ci_env.sh

      - name: Build web
        run: flutter build web --release --base-href "/CollectionApp/"

      - name: Add .nojekyll for GitHub Pages
        run: touch build/web/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
